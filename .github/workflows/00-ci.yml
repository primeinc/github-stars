name: 'CI'

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gate:
    # `pnpm gate` is the single readiness command per issue #69 lesson 1.
    # Sub-stages: typecheck, test, validate (taxonomy + schema), generated
    # artifact registry presence, actionlint workflow lint.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        # Pin a known-good pnpm version that matches lockfileVersion 9.0
        # (pnpm-lock.yaml). `pnpm@latest` previously broke this step with a
        # silent ~3s failure that left zero diagnostic output.
        run: npm install -g pnpm@10.13.1

      - name: Install dependencies
        # Retry up to 3 attempts on transient registry/network failures;
        # the previous run failed in ~3s with no useful log.
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if pnpm install --prefer-offline; then
              exit 0
            fi
            echo "::warning::pnpm install attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "::error::pnpm install failed after 3 attempts"
          exit 1

      - name: Install actionlint (used by gate)
        env:
          ACTIONLINT_VERSION: '1.7.12'
        run: |
          set -euo pipefail
          # The downloader requires the target dir to already exist
          # ("Directory '...' does not exist" error otherwise).
          mkdir -p "$RUNNER_TEMP/actionlint-bin"
          curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash" \
            | bash -s -- "${ACTIONLINT_VERSION}" "$RUNNER_TEMP/actionlint-bin"
          echo "$RUNNER_TEMP/actionlint-bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/actionlint-bin/actionlint" -version

      - name: pnpm gate
        run: pnpm gate

      - name: CI summary
        if: always()
        run: |
          {
            echo "# CI — pnpm gate"
            echo ""
            echo "- Workflow: \`${{ github.workflow }}\`"
            echo "- Run ID: \`${{ github.run_id }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo ""
            echo "## Gate stages (\`pnpm gate\`)"
            echo "- \`typecheck\` (tsc --noEmit)"
            echo "- \`test\` (vitest)"
            echo "- \`validate\` (taxonomy + schema)"
            echo "- generated-artifacts registry presence"
            echo "- \`actionlint\` workflow lint"
            echo ""
            echo "Web build/lint runs in the separate \`Web CI\` workflow (\`.github/workflows/00b-web-ci.yml\`)."
            echo "Workflow-lint extra footgun guards run in the \`workflow-lint\` job below."
          } >> "$GITHUB_STEP_SUMMARY"

  workflow-lint:
    # Cheap structural guards that pnpm gate's actionlint stage cannot
    # express. See `.sisyphus/proofs/02M-mode-correction.md`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Specific guard against the cardinalby/schema-validator-action mode
      # footgun. The action accepts default | lax | strong | spec only.
      # `strict` is invalid and would only fail at runtime in the
      # production chain (see 02M-mode-correction.md Bug A). actionlint
      # cannot catch this because cardinalby's action.yml does not enum
      # the mode field.
      #
      # The regex is anchored to the start of a YAML key so it cannot
      # match `mode: 'strict'` substrings inside echo lines or comments
      # (which is how the v1 of this guard self-tripped on its own
      # diagnostic strings).
      - name: Reject invalid cardinalby/schema-validator-action mode values
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=( .github/workflows/*.yml .github/workflows/*.yaml )
          bad=""
          for f in "${files[@]}"; do
            # Only inspect files that actually use the action.
            if ! grep -q 'cardinalby/schema-validator-action' "$f"; then
              continue
            fi
            # Anchored to ^\s*mode: so we only match real YAML keys.
            hit=$(grep -nE "^[[:space:]]+mode:[[:space:]]*['\"]?strict['\"]?[[:space:]]*$" "$f" || true)
            if [ -n "$hit" ]; then
              bad="${bad}${f}:\n${hit}\n"
            fi
          done
          if [ -n "$bad" ]; then
            {
              echo "::error::cardinalby/schema-validator-action does not accept the value reserved for an invalid mode."
              echo "::error::Allowed: default | lax | strong | spec. See .sisyphus/proofs/02M-mode-correction.md."
              printf '%b' "$bad"
            } >&2
            exit 1
          fi
          echo "No invalid mode values found in cardinalby/schema-validator-action steps."

      # Per session-oracle verdict rule 1-7: a workflow MUST NOT silently
      # mix credential classes. The historical laundering shape was
      #   `secrets.STARS_TOKEN || secrets.GITHUB_TOKEN`
      # or
      #   `steps.app-token.outputs.token || secrets.STARS_TOKEN || ...`
      # Reject any expression that ORs across credential classes inside
      # a single role (token slot). Allowed: branch on
      # steps.doctor.outputs.selected_mode and assign one credential per
      # branch (the new pattern in 01-fetch / 02-sync).
      - name: Reject mixed-credential laundering in workflow expressions
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=( .github/workflows/*.yml .github/workflows/*.yaml )
          bad=""
          # Strip comment lines (lines whose first non-whitespace char is #)
          # before grepping. Without this the guard would self-trip on its
          # own diagnostic comments — same class of bug as the
          # cardinalby-mode guard hit in v1 (see 02M-mode-correction.md).
          for f in "${files[@]}"; do
            non_comments=$(grep -vE '^[[:space:]]*#' "$f" || true)
            # Pattern 1: STARS_TOKEN || GITHUB_TOKEN (any order, any whitespace).
            hit1=$(printf '%s\n' "$non_comments" | grep -nE 'secrets\.STARS_TOKEN[[:space:]]*\|\|[[:space:]]*secrets\.GITHUB_TOKEN' || true)
            hit2=$(printf '%s\n' "$non_comments" | grep -nE 'secrets\.GITHUB_TOKEN[[:space:]]*\|\|[[:space:]]*secrets\.STARS_TOKEN' || true)
            # Pattern 2: app-token.outputs.token OR'd with any other secret.
            hit3=$(printf '%s\n' "$non_comments" | grep -nE 'app-token\.outputs\.token[[:space:]]*\|\|[[:space:]]*secrets\.' || true)
            for h in "$hit1" "$hit2" "$hit3"; do
              if [ -n "$h" ]; then bad="${bad}${f}:\n${h}\n"; fi
            done
          done
          if [ -n "$bad" ]; then
            {
              echo "::error::Mixed-credential laundering detected in workflow YAML."
              echo "::error::A token slot must use exactly one credential class per run, selected by steps.doctor.outputs.selected_mode."
              echo "::error::See session-oracle verdict rules 1-7 (PR adding strict 3-mode resolver)."
              printf '%b' "$bad"
            } >&2
            exit 1
          fi
          echo "No mixed-credential expressions detected in workflow YAML."

      # Per session-oracle verdict rule 8: blocked/private source NAMES
      # must not surface in public outputs/summaries. The legacy
      # `blocked_orgs` step output (a CSV of org names) is forbidden;
      # use `blocked_orgs_count` instead.
      - name: Reject leaked blocked-org names in workflow outputs
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=( .github/workflows/*.yml .github/workflows/*.yaml )
          bad=""
          # Strip comment lines first so the guard cannot self-trip on
          # its own inline doc text. Same defensive pattern as the
          # mixed-credential guard above.
          for f in "${files[@]}"; do
            non_comments=$(grep -vE '^[[:space:]]*#' "$f" || true)
            # ^\s+blocked_orgs: ... (job/step output key, not _count).
            hit=$(printf '%s\n' "$non_comments" | grep -nE "^[[:space:]]+blocked_orgs:[[:space:]]" || true)
            if [ -n "$hit" ]; then bad="${bad}${f}:\n${hit}\n"; fi
            # BLOCKED_ORGS env var (used to substitute names into summaries).
            hit2=$(printf '%s\n' "$non_comments" | grep -nE "^[[:space:]]+BLOCKED_ORGS:[[:space:]]" || true)
            if [ -n "$hit2" ]; then bad="${bad}${f}:\n${hit2}\n"; fi
          done
          if [ -n "$bad" ]; then
            {
              echo "::error::Workflow exposes blocked org NAMES in outputs/env. Use blocked_orgs_count (count only) per session-oracle verdict rule 8."
              printf '%b' "$bad"
            } >&2
            exit 1
          fi
          echo "No blocked-org name leakage detected in workflow YAML."

      - name: workflow-lint summary
        if: always()
        run: |
          {
            echo "# CI (workflow-lint footgun guards)"
            echo ""
            echo "- Workflow: \`${{ github.workflow }}\`"
            echo "- Run ID: \`${{ github.run_id }}\`"
            echo ""
            echo "## Gates"
            echo "- cardinalby/schema-validator-action mode-value guard (rejects unsupported values)"
            echo "- mixed-credential laundering guard (rejects \`STARS_TOKEN || GITHUB_TOKEN\` and \`app-token || secrets.\` patterns)"
            echo "- blocked-org name leakage guard (rejects \`blocked_orgs\` output / \`BLOCKED_ORGS\` env in workflow YAML)"
            echo ""
            echo "actionlint runs inside \`pnpm gate\` (CI / gate job)."
            echo "Tracking issue for richer dry-run gates: #62"
          } >> "$GITHUB_STEP_SUMMARY"
