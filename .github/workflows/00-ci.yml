name: 'bun gate'

# Workflow name is forward-looking and tracks the bun migration in
# PR #79 (chore: modernization sprint — bun 1.3.13 + ts 6 + zod 4).
# Until #79 merges, the implementation below still bootstraps pnpm
# and invokes `pnpm gate`; renaming the status check on every step
# of the migration would invalidate the ruleset binding. The job
# `name:` (`all gates pass`) is the required-status-check context
# in the rulesets and is toolchain-agnostic.

on:
  pull_request:
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: all gates pass
    # `bun run gate` is the single readiness command per issue #69
    # lesson 1, and the destination toolchain per PR #79. Until #79
    # merges, this job bootstraps pnpm and invokes `pnpm gate` (the
    # same sub-stages, just a different package manager). Sub-stages:
    # typecheck, test, validate (taxonomy + schema), generated artifact
    # registry presence, actionlint workflow lint.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        # Pin a known-good pnpm version that matches lockfileVersion 9.0
        # (pnpm-lock.yaml). `pnpm@latest` previously broke this step with a
        # silent ~3s failure that left zero diagnostic output.
        run: npm install -g pnpm@10.13.1

      - name: Install dependencies
        # Retry up to 3 attempts on transient registry/network failures;
        # the previous run failed in ~3s with no useful log.
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if pnpm install --prefer-offline; then
              exit 0
            fi
            echo "::warning::pnpm install attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "::error::pnpm install failed after 3 attempts"
          exit 1

      - name: Install actionlint (used by gate)
        env:
          ACTIONLINT_VERSION: '1.7.12'
        run: |
          set -euo pipefail
          # The downloader requires the target dir to already exist
          # ("Directory '...' does not exist" error otherwise).
          mkdir -p "$RUNNER_TEMP/actionlint-bin"
          curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash" \
            | bash -s -- "${ACTIONLINT_VERSION}" "$RUNNER_TEMP/actionlint-bin"
          echo "$RUNNER_TEMP/actionlint-bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/actionlint-bin/actionlint" -version

      - name: pnpm gate
        run: pnpm gate

      - name: pnpm gate summary
        if: always()
        run: |
          {
            echo "# pnpm gate"
            echo ""
            echo "- Workflow: \`${{ github.workflow }}\`"
            echo "- Run ID: \`${{ github.run_id }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo ""
            echo "## Gate stages (\`pnpm gate\`)"
            echo "- \`typecheck\` (tsc --noEmit)"
            echo "- \`test\` (vitest)"
            echo "- \`validate\` (taxonomy + schema)"
            echo "- generated-artifacts registry presence"
            echo "- \`actionlint\` workflow lint"
            echo ""
            echo "Web build/lint runs in the separate \`npm web build\` workflow (\`.github/workflows/00b-web-ci.yml\`)."
            echo "Workflow-lint extra footgun guards run in the separate \`gh-action workflow lint\` workflow (\`.github/workflows/00j-gh-action-workflow-lint.yml\`)."
          } >> "$GITHUB_STEP_SUMMARY"
