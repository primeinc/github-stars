name: branch-rulesets

# Per the protection-stage brief, this workflow operates the
# tracked ruleset specs in `.github-stars/control-plane/rulesets/`
# in two modes:
#
#   - check  (default): render specs at runtime, diff against the
#            live rulesets, fail on drift. Read-only.
#   - upsert (gated):   render + create-or-update the live rulesets
#            via PUT /repos/{owner}/{repo}/rulesets/{id}.
#
# Per Copilot review on PR #81 (00e:36) and per
# ../refs/github/docs/data/reusables/actions/jobs/section-using-
# environments-for-jobs.md: the `environment:` job key takes a
# single name string (or an object with name+url). It does not
# accept an empty-string expression. Split into two jobs so only
# the upsert job declares `environment: github-admin`. Bash logic
# is duplicated inline in each job rather than sourced from a
# shared file — that's the simpler, more idiomatic shape and
# avoids spreading the path-scope allow-list to a non-rulesets
# directory.

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Ruleset operation: check reports drift, upsert creates/updates'
        required: true
        default: check
        type: choice
        options:
          - check
          - upsert
      enforcement:
        description: 'Ruleset enforcement mode'
        required: true
        default: disabled
        type: choice
        options:
          - disabled
          - active
      confirm_upsert:
        description: 'Required for operation=upsert: type APPLY_RULESETS'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # check: always runs. Renders specs, diffs against live rulesets,
  # fails on drift. No environment gate; this path is read-only.
  # ----------------------------------------------------------------
  check:
    name: branch-rulesets-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout tracked ruleset specs
        uses: actions/checkout@v6

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-administration: write

      - name: Check ruleset drift (read-only)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ENFORCEMENT: ${{ inputs.enforcement }}
          GH_APP_ID: ${{ vars.GH_APP_ID }}
          OPERATION: check
        run: |
          set -euo pipefail

          if ! [[ "${GH_APP_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::vars.GH_APP_ID must be the numeric GitHub App ID used as the ruleset Integration bypass actor."
            exit 1
          fi

          gh_rules_api() {
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$@"
          }

          ruleset_id_by_name() {
            local name="$1"
            gh_rules_api --paginate "/repos/${REPO}/rulesets?includes_parents=false" \
              | jq -r --arg name "${name}" '
                  if type == "array" then .[] else . end
                  | select(.name == $name)
                  | .id
                ' \
              | head -n 1
          }

          normalize_ruleset() {
            jq -S '{
              name,
              target,
              enforcement,
              conditions: {
                ref_name: {
                  include: (.conditions.ref_name.include // []),
                  exclude: (.conditions.ref_name.exclude // [])
                }
              },
              rules: [
                .rules[]
                | if .type == "pull_request" then {
                    type,
                    parameters: {
                      allowed_merge_methods: (.parameters.allowed_merge_methods // []),
                      dismiss_stale_reviews_on_push: (.parameters.dismiss_stale_reviews_on_push // false),
                      require_code_owner_review: (.parameters.require_code_owner_review // false),
                      require_last_push_approval: (.parameters.require_last_push_approval // false),
                      required_approving_review_count: (.parameters.required_approving_review_count // 0),
                      required_review_thread_resolution: (.parameters.required_review_thread_resolution // false)
                    }
                  }
                  elif .type == "required_status_checks" then {
                    type,
                    parameters: {
                      strict_required_status_checks_policy: (.parameters.strict_required_status_checks_policy // false),
                      required_status_checks: [
                        .parameters.required_status_checks[]?
                        | {context}
                      ] | sort_by(.context)
                    }
                  }
                  else {type}
                  end
              ] | sort_by(.type),
              bypass_actors: [
                .bypass_actors[]?
                | {
                    actor_id,
                    actor_type,
                    bypass_mode: (.bypass_mode // "pull_request")
                  }
              ] | sort_by(.actor_type, .actor_id, .bypass_mode)
            }'
          }

          render_spec() {
            # `bypass_mode: "pull_request"` per the GitHub REST docs:
            # "pull_request means that an actor can only bypass rules
            # on pull requests" and "pull_request is only applicable
            # to branch rulesets." Strictly tighter than `always`.
            local spec="$1"
            local rendered="$2"
            jq \
              --arg enforcement "${ENFORCEMENT}" \
              --argjson app_id "${GH_APP_ID}" \
              '.enforcement = $enforcement
               | .bypass_actors = [
                   {
                     actor_id: $app_id,
                     actor_type: "Integration",
                     bypass_mode: "pull_request"
                   }
                 ]' \
              "${spec}" > "${rendered}"
          }

          check_ruleset() {
            local spec="$1"
            local name rendered desired actual id
            name=$(jq -r '.name' "${spec}")
            rendered=$(mktemp); desired=$(mktemp); actual=$(mktemp)
            render_spec "${spec}" "${rendered}"
            normalize_ruleset < "${rendered}" > "${desired}"
            id=$(ruleset_id_by_name "${name}" || true)
            if [ -z "${id}" ]; then
              echo "::error::ruleset missing: ${name}"
              return 1
            fi
            gh_rules_api "/repos/${REPO}/rulesets/${id}" > "${actual}.raw"
            normalize_ruleset < "${actual}.raw" > "${actual}"
            if diff -u "${desired}" "${actual}"; then
              echo "ruleset ok: ${name}"
            else
              echo "::error::ruleset drift: ${name}"
              return 1
            fi
          }

          check_ruleset ".github-stars/control-plane/rulesets/protect-next.json"
          check_ruleset ".github-stars/control-plane/rulesets/protect-main-release-only.json"

      - name: Check summary
        if: always()
        run: |
          {
            echo "# Branch rulesets — check"
            echo ""
            echo "- Operation: \`check\` (drift report only; no mutation)"
            echo "- Enforcement: \`${{ inputs.enforcement }}\`"
            echo "- Ref guard: \`refs/heads/main\` only"
            echo "- Specs: \`.github-stars/control-plane/rulesets/*.json\`"
            echo "- Bypass actor: GitHub App Integration from \`vars.GH_APP_ID\` (rendered at runtime)"
            echo "- App permission required: \`Administration: write\` on this repository"
          } >>"$GITHUB_STEP_SUMMARY"

  # ----------------------------------------------------------------
  # upsert: gated. Runs only when the operator dispatches
  # operation=upsert AND confirm_upsert=APPLY_RULESETS. Declares
  # `environment: github-admin` so deployment protection rules
  # (when configured) gate the actual mutation.
  # ----------------------------------------------------------------
  upsert:
    name: branch-rulesets-upsert
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && inputs.operation == 'upsert'
    environment: github-admin
    steps:
      - name: Checkout tracked ruleset specs
        uses: actions/checkout@v6

      - name: Validate upsert authorization
        env:
          CONFIRM_UPSERT: ${{ inputs.confirm_upsert }}
        run: |
          set -euo pipefail
          if [ "${CONFIRM_UPSERT}" != "APPLY_RULESETS" ]; then
            echo "::error::operation=upsert requires confirm_upsert=APPLY_RULESETS."
            exit 1
          fi

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-administration: write

      - name: Upsert + verify ruleset state
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ENFORCEMENT: ${{ inputs.enforcement }}
          GH_APP_ID: ${{ vars.GH_APP_ID }}
          OPERATION: upsert
        run: |
          set -euo pipefail

          if ! [[ "${GH_APP_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::vars.GH_APP_ID must be the numeric GitHub App ID used as the ruleset Integration bypass actor."
            exit 1
          fi

          gh_rules_api() {
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$@"
          }

          ruleset_id_by_name() {
            local name="$1"
            gh_rules_api --paginate "/repos/${REPO}/rulesets?includes_parents=false" \
              | jq -r --arg name "${name}" '
                  if type == "array" then .[] else . end
                  | select(.name == $name)
                  | .id
                ' \
              | head -n 1
          }

          normalize_ruleset() {
            jq -S '{
              name,
              target,
              enforcement,
              conditions: {
                ref_name: {
                  include: (.conditions.ref_name.include // []),
                  exclude: (.conditions.ref_name.exclude // [])
                }
              },
              rules: [
                .rules[]
                | if .type == "pull_request" then {
                    type,
                    parameters: {
                      allowed_merge_methods: (.parameters.allowed_merge_methods // []),
                      dismiss_stale_reviews_on_push: (.parameters.dismiss_stale_reviews_on_push // false),
                      require_code_owner_review: (.parameters.require_code_owner_review // false),
                      require_last_push_approval: (.parameters.require_last_push_approval // false),
                      required_approving_review_count: (.parameters.required_approving_review_count // 0),
                      required_review_thread_resolution: (.parameters.required_review_thread_resolution // false)
                    }
                  }
                  elif .type == "required_status_checks" then {
                    type,
                    parameters: {
                      strict_required_status_checks_policy: (.parameters.strict_required_status_checks_policy // false),
                      required_status_checks: [
                        .parameters.required_status_checks[]?
                        | {context}
                      ] | sort_by(.context)
                    }
                  }
                  else {type}
                  end
              ] | sort_by(.type),
              bypass_actors: [
                .bypass_actors[]?
                | {
                    actor_id,
                    actor_type,
                    bypass_mode: (.bypass_mode // "pull_request")
                  }
              ] | sort_by(.actor_type, .actor_id, .bypass_mode)
            }'
          }

          render_spec() {
            local spec="$1"
            local rendered="$2"
            jq \
              --arg enforcement "${ENFORCEMENT}" \
              --argjson app_id "${GH_APP_ID}" \
              '.enforcement = $enforcement
               | .bypass_actors = [
                   {
                     actor_id: $app_id,
                     actor_type: "Integration",
                     bypass_mode: "pull_request"
                   }
                 ]' \
              "${spec}" > "${rendered}"
          }

          upsert_ruleset() {
            local name="$1"
            local payload="$2"
            local id
            id=$(ruleset_id_by_name "${name}" || true)
            if [ -n "${id}" ]; then
              echo "Updating ruleset ${name} (${id})"
              gh_rules_api \
                --method PUT \
                "/repos/${REPO}/rulesets/${id}" \
                --input "${payload}" \
                --jq '{id, name, target, enforcement}'
            else
              echo "Creating ruleset ${name}"
              gh_rules_api \
                --method POST \
                "/repos/${REPO}/rulesets" \
                --input "${payload}" \
                --jq '{id, name, target, enforcement}'
            fi
          }

          upsert_and_verify() {
            local spec="$1"
            local name rendered desired actual id
            name=$(jq -r '.name' "${spec}")
            rendered=$(mktemp); desired=$(mktemp); actual=$(mktemp)
            render_spec "${spec}" "${rendered}"
            normalize_ruleset < "${rendered}" > "${desired}"
            upsert_ruleset "${name}" "${rendered}"
            id=$(ruleset_id_by_name "${name}" || true)
            if [ -z "${id}" ]; then
              echo "::error::upsert succeeded but ruleset id not found by name: ${name}"
              return 1
            fi
            gh_rules_api "/repos/${REPO}/rulesets/${id}" > "${actual}.raw"
            normalize_ruleset < "${actual}.raw" > "${actual}"
            if diff -u "${desired}" "${actual}"; then
              echo "ruleset ok: ${name}"
            else
              echo "::error::ruleset drift after upsert: ${name}"
              return 1
            fi
          }

          upsert_and_verify ".github-stars/control-plane/rulesets/protect-next.json"
          upsert_and_verify ".github-stars/control-plane/rulesets/protect-main-release-only.json"

      - name: Upsert summary
        if: always()
        run: |
          {
            echo "# Branch rulesets — upsert"
            echo ""
            echo "- Operation: \`upsert\` (create or update)"
            echo "- Enforcement: \`${{ inputs.enforcement }}\`"
            echo "- Ref guard: \`refs/heads/main\` only"
            echo "- Confirmation: \`confirm_upsert=APPLY_RULESETS\` required"
            echo "- Environment: \`github-admin\` (deployment protection rules apply if configured)"
            echo "- Specs: \`.github-stars/control-plane/rulesets/*.json\`"
            echo "- Bypass actor: GitHub App Integration from \`vars.GH_APP_ID\` (rendered at runtime)"
            echo "- App permission required: \`Administration: write\` on this repository"
          } >>"$GITHUB_STEP_SUMMARY"
