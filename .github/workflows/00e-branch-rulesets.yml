name: branch-rulesets

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Ruleset operation: check reports drift, upsert creates/updates'
        required: true
        default: check
        type: choice
        options:
          - check
          - upsert
      enforcement:
        description: 'Ruleset enforcement mode'
        required: true
        default: disabled
        type: choice
        options:
          - disabled
          - active
      confirm_upsert:
        description: 'Required for operation=upsert: type APPLY_RULESETS'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  branch-rulesets:
    name: branch-rulesets-${{ inputs.operation }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: ${{ inputs.operation == 'upsert' && 'github-admin' || '' }}
    steps:
      - name: Checkout tracked ruleset specs
        uses: actions/checkout@v6

      - name: Validate upsert authorization
        if: inputs.operation == 'upsert'
        env:
          CONFIRM_UPSERT: ${{ inputs.confirm_upsert }}
        run: |
          set -euo pipefail
          if [ "${CONFIRM_UPSERT}" != "APPLY_RULESETS" ]; then
            echo "::error::operation=upsert requires confirm_upsert=APPLY_RULESETS."
            exit 1
          fi

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-administration: write

      - name: Check or upsert branch rulesets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          OPERATION: ${{ inputs.operation }}
          ENFORCEMENT: ${{ inputs.enforcement }}
          GH_APP_ID: ${{ vars.GH_APP_ID }}
        run: |
          set -euo pipefail

          if ! [[ "${GH_APP_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::vars.GH_APP_ID must be the numeric GitHub App ID used as the ruleset Integration bypass actor."
            exit 1
          fi

          gh_rules_api() {
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$@"
          }

          list_rulesets() {
            gh_rules_api --paginate "/repos/${REPO}/rulesets?includes_parents=false"
          }

          ruleset_id_by_name() {
            local name="$1"
            list_rulesets \
              | jq -r --arg name "${name}" '
                  if type == "array" then .[] else . end
                  | select(.name == $name)
                  | .id
                ' \
              | head -n 1
          }

          normalize_ruleset() {
            jq -S '{
              name,
              target,
              enforcement,
              conditions: {
                ref_name: {
                  include: (.conditions.ref_name.include // []),
                  exclude: (.conditions.ref_name.exclude // [])
                }
              },
              rules: [
                .rules[]
                | if .type == "pull_request" then {
                    type,
                    parameters: {
                      allowed_merge_methods: (.parameters.allowed_merge_methods // []),
                      dismiss_stale_reviews_on_push: (.parameters.dismiss_stale_reviews_on_push // false),
                      require_code_owner_review: (.parameters.require_code_owner_review // false),
                      require_last_push_approval: (.parameters.require_last_push_approval // false),
                      required_approving_review_count: (.parameters.required_approving_review_count // 0),
                      required_review_thread_resolution: (.parameters.required_review_thread_resolution // false)
                    }
                  }
                  elif .type == "required_status_checks" then {
                    type,
                    parameters: {
                      strict_required_status_checks_policy: (.parameters.strict_required_status_checks_policy // false),
                      required_status_checks: [
                        .parameters.required_status_checks[]?
                        | {context}
                      ] | sort_by(.context)
                    }
                  }
                  else {type}
                  end
              ] | sort_by(.type),
              bypass_actors: [
                .bypass_actors[]?
                | {
                    actor_id,
                    actor_type,
                    bypass_mode: (.bypass_mode // "pull_request")
                  }
              ] | sort_by(.actor_type, .actor_id, .bypass_mode)
            }'
          }

          render_spec() {
            local spec="$1"
            local rendered="$2"
            # `bypass_mode: "pull_request"` per
            # https://docs.github.com/en/rest/repos/rules#create-a-repository-ruleset
            # — "pull_request means that an actor can only bypass rules
            # on pull requests" and "pull_request is only applicable to
            # branch rulesets." For an automation App that gates merges
            # via PR (next -> main release flow + admin/control-plane PR
            # flow), pull_request is strictly tighter than always while
            # still letting the App close release PRs.
            jq \
              --arg enforcement "${ENFORCEMENT}" \
              --argjson app_id "${GH_APP_ID}" \
              '.enforcement = $enforcement
               | .bypass_actors = [
                   {
                     actor_id: $app_id,
                     actor_type: "Integration",
                     bypass_mode: "pull_request"
                   }
                 ]' \
              "${spec}" > "${rendered}"
          }

          upsert_ruleset() {
            local name="$1"
            local payload="$2"
            local id
            id=$(ruleset_id_by_name "${name}" || true)

            if [ -n "${id}" ]; then
              echo "Updating ruleset ${name} (${id})"
              gh_rules_api \
                --method PUT \
                "/repos/${REPO}/rulesets/${id}" \
                --input "${payload}" \
                --jq '{id, name, target, enforcement}'
            else
              echo "Creating ruleset ${name}"
              gh_rules_api \
                --method POST \
                "/repos/${REPO}/rulesets" \
                --input "${payload}" \
                --jq '{id, name, target, enforcement}'
            fi
          }

          check_ruleset() {
            local spec="$1"
            local name
            local rendered
            local desired
            local actual
            local id

            name=$(jq -r '.name' "${spec}")
            rendered=$(mktemp)
            desired=$(mktemp)
            actual=$(mktemp)

            render_spec "${spec}" "${rendered}"
            normalize_ruleset < "${rendered}" > "${desired}"

            id=$(ruleset_id_by_name "${name}" || true)

            if [ -z "${id}" ]; then
              if [ "${OPERATION}" = "upsert" ]; then
                upsert_ruleset "${name}" "${rendered}"
                id=$(ruleset_id_by_name "${name}" || true)
              else
                echo "::error::ruleset missing: ${name}"
                return 1
              fi
            elif [ "${OPERATION}" = "upsert" ]; then
              upsert_ruleset "${name}" "${rendered}"
            fi

            gh_rules_api "/repos/${REPO}/rulesets/${id}" > "${actual}.raw"
            normalize_ruleset < "${actual}.raw" > "${actual}"

            if diff -u "${desired}" "${actual}"; then
              echo "ruleset ok: ${name}"
            else
              echo "::error::ruleset drift after ${OPERATION}: ${name}"
              return 1
            fi
          }

          check_ruleset ".github-stars/control-plane/rulesets/protect-next.json"
          check_ruleset ".github-stars/control-plane/rulesets/protect-main-release-only.json"

      - name: Ruleset summary
        if: always()
        run: |
          {
            echo "# Branch rulesets"
            echo ""
            echo "- Operation: \`${{ inputs.operation }}\`"
            echo "- Enforcement: \`${{ inputs.enforcement }}\`"
            echo "- Ref guard: \`refs/heads/main\` only"
            echo "- Upsert confirmation: \`confirm_upsert=APPLY_RULESETS\` required"
            echo "- Upsert environment: \`github-admin\`"
            echo "- Specs: \`.github-stars/control-plane/rulesets/*.json\`"
            echo "- Bypass actor: GitHub App Integration from \`vars.GH_APP_ID\`"
            echo "- App permission required: \`Administration: write\` on this repository"
          } >> "$GITHUB_STEP_SUMMARY"
