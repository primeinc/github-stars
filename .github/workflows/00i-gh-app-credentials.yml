name: gh-app credentials

# Per the protection-stage brief: every PR from `ghapp/repo-admin`
# proves that vars.GH_APP_ID + secrets.GH_APP_PRIVATE_KEY mint a
# valid installation token AND the App is installed on this repo.
#
# If App ID is wrong or the key doesn't match, the token-mint step
# fails loud with a JWT signature error. If the App isn't installed
# here, the install-verification step fails loud. Both cases must
# be resolved before the admin lane can mutate anything.
#
# Pass-through for non-`ghapp/repo-admin` heads so this check name
# remains a viable required-status-check on every PR to main.

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ADMIN_LANE_BRANCH: ghapp/repo-admin

jobs:
  credentials:
    name: token + install
    runs-on: ubuntu-latest
    steps:
      - name: Validate vars.GH_APP_ID format (ghapp/repo-admin only)
        if: github.event.pull_request.head.ref == env.ADMIN_LANE_BRANCH
        env:
          GH_APP_ID: ${{ vars.GH_APP_ID }}
        run: |
          set -euo pipefail
          if ! [[ "${GH_APP_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::vars.GH_APP_ID must be the numeric GitHub App ID. Got: '${GH_APP_ID}'"
            exit 1
          fi
          echo "vars.GH_APP_ID format ok: ${GH_APP_ID}"

      - name: Mint App installation token (proves App ID + private key match)
        id: app-token
        if: github.event.pull_request.head.ref == env.ADMIN_LANE_BRANCH
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Verify App is installed on this repo
        if: github.event.pull_request.head.ref == env.ADMIN_LANE_BRANCH
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INSTALLATION_ID: ${{ steps.app-token.outputs.installation-id }}
          THIS_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "installation-id=${INSTALLATION_ID}"

          # Probe ONLY this repo's installation. Two reasons we do NOT
          # call `/installation/repositories` here:
          #
          #   1. `/installation/repositories` is paginated (default 30
          #      per page). Without `--paginate` the response would be
          #      truncated and a repo on a later page would falsely
          #      register as "not installed" (Copilot review on PR #81,
          #      00i:74).
          #   2. `/installation/repositories` enumerates EVERY repo
          #      (including private ones) the App has access to. On a
          #      public repo, dumping that list into Actions logs would
          #      leak private repo names (Copilot review on PR #81,
          #      00i:73).
          #
          # `GET /repos/{owner}/{repo}/installation` returns 200 when
          # the App is installed on this specific repo and 404 when it
          # isn't — exactly the question we're asking, with no
          # enumeration side-effect. `gh api` returns non-zero on 404
          # so we can branch on exit status directly. `2>/dev/null`
          # suppresses gh's 404 body (no useful info; would just spam
          # the log on the not-installed path).
          if gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --silent \
            "/repos/${THIS_REPO}/installation" 2>/dev/null; then
            echo "token + install (App installed on ${THIS_REPO})"
          else
            echo "::error::App (vars.GH_APP_ID=${{ vars.GH_APP_ID }}) is NOT installed on ${THIS_REPO}, or the installation lookup failed. Check the App's installation scope at https://github.com/settings/apps/<app-slug>/installations."
            exit 1
          fi

      - name: Pass-through for non-admin heads
        if: github.event.pull_request.head.ref != env.ADMIN_LANE_BRANCH
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Non-admin head (${HEAD_REF}); credentials check does not apply. Pass."
