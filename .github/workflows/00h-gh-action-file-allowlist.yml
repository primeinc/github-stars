name: gh-action file allowlist

# Per the protection-stage brief: PRs from `ghapp/repo-admin` to
# `main` may ONLY modify admin/control-plane files. Anything outside
# the allowed set fails so unrelated changes can't ride in on an
# admin PR.
#
# Allowed paths (Medium scope per brief):
#   - .github/workflows/00*.yml
#   - .github-stars/control-plane/**
#   - AGENTS.md
#   - docs/automation/**
#   - docs/security.md
#   - .github/PULL_REQUEST_TEMPLATE.md
#
# Pass-through for non-`ghapp/repo-admin` heads so this check name
# remains a viable required-status-check on every PR to main.

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ADMIN_LANE_BRANCH: ghapp/repo-admin

jobs:
  file-allowlist:
    name: only allowed files
    runs-on: ubuntu-latest
    steps:
      - name: Match changed files against allowlist (ghapp/repo-admin only)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "${HEAD_REF}" != "${ADMIN_LANE_BRANCH}" ]; then
            echo "Non-admin head (${HEAD_REF}); file allowlist check does not apply. Pass."
            exit 0
          fi

          allowed_globs=(
            ".github/workflows/00*.yml"
            ".github-stars/control-plane/*"
            ".github-stars/control-plane/**"
            "AGENTS.md"
            "docs/automation/*"
            "docs/automation/**"
            "docs/security.md"
            ".github/PULL_REQUEST_TEMPLATE.md"
          )

          shopt -s extglob globstar nullglob

          path_in_scope() {
            local path="$1"
            local glob
            for glob in "${allowed_globs[@]}"; do
              # shellcheck disable=SC2053  # intentional glob match, not literal
              if [[ "${path}" == ${glob} ]]; then
                return 0
              fi
            done
            return 1
          }

          changed=$(gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename')

          violations=()
          while IFS= read -r path; do
            [ -z "${path}" ] && continue
            if ! path_in_scope "${path}"; then
              violations+=("${path}")
            fi
          done <<<"${changed}"

          if [ "${#violations[@]}" -gt 0 ]; then
            echo "::error::ghapp/repo-admin PR touches paths outside the admin/control-plane scope. Move non-admin changes to a separate PR via 'next'. Out-of-scope paths:"
            for p in "${violations[@]}"; do
              echo "::error::  - ${p}"
            done
            echo ""
            echo "Allowed paths:"
            for g in "${allowed_globs[@]}"; do
              echo "  - ${g}"
            done
            exit 1
          fi

          echo "only allowed files (every changed path is within the admin/control-plane scope)"
