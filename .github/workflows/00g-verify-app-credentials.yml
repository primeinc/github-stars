name: verify-app-credentials

# One-shot diagnostic: mint a GitHub App installation token using
# `vars.GH_APP_ID` + `secrets.GH_APP_PRIVATE_KEY`. If the App ID or
# the private key don't match the actual App, the token-mint step
# fails loud with a JWT signature error. Successful mint proves
# both vars are correct.
#
# This workflow exists because reading the App's own ID via
# `GET /app` requires JWT auth (chicken/egg without a known-good
# App ID). The canonical "where is my App ID" answer per
# ../refs/github/docs/content/apps/creating-github-apps/.../*.md
# is the App settings page in browser:
#   https://github.com/settings/apps/<app-slug>
# This workflow is the programmatic round-trip equivalent.
#
# Run from the Actions tab via workflow_dispatch.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify-app-credentials
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Validate vars.GH_APP_ID format
        env:
          GH_APP_ID: ${{ vars.GH_APP_ID }}
        run: |
          set -euo pipefail
          if ! [[ "${GH_APP_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::vars.GH_APP_ID must be the numeric GitHub App ID. Got: '${GH_APP_ID}'"
            exit 1
          fi
          echo "vars.GH_APP_ID format ok: ${GH_APP_ID}"

      - name: Mint App installation token (proves App ID + private key match)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Read App identity via installation token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INSTALLATION_ID: ${{ steps.app-token.outputs.installation-id }}
        run: |
          set -euo pipefail
          echo "installation-id=${INSTALLATION_ID}"

          # `GET /installation/repositories` is callable with an
          # installation token and confirms the App is installed on
          # this repo. Per
          # ../refs/github/docs/content/rest/apps/installations.md
          # — endpoints requiring app installation auth.
          repos=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /installation/repositories \
            --jq '.repositories | map({full_name, private})')

          echo "Installed on:"
          echo "${repos}" | jq -r '.[] | "  - \(.full_name)\(if .private then " (private)" else " (public)" end)"'

          # Sanity check: this repo should be in the list.
          this_repo="${{ github.repository }}"
          if ! echo "${repos}" | jq -e --arg r "${this_repo}" '.[] | select(.full_name == $r)' >/dev/null; then
            echo "::error::App is NOT installed on ${this_repo} (App ID ${{ vars.GH_APP_ID }}). Check the App's installation scope."
            exit 1
          fi
          echo "App is installed on ${this_repo}: OK"

      - name: Summary
        if: always()
        run: |
          {
            echo "# verify-app-credentials"
            echo ""
            echo "- vars.GH_APP_ID: \`${{ vars.GH_APP_ID }}\`"
            echo "- secrets.GH_APP_PRIVATE_KEY: present (mint succeeded)"
            echo "- Installation ID: \`${{ steps.app-token.outputs.installation-id }}\`"
            echo "- Verified: this repo is in the App's installation scope"
            echo ""
            echo "## What this proves"
            echo "- vars.GH_APP_ID is the correct numeric App ID for the App backed by secrets.GH_APP_PRIVATE_KEY (token mint requires both to match — JWT signature would fail otherwise)."
            echo "- The App is installed on this repository."
          } >>"$GITHUB_STEP_SUMMARY"
