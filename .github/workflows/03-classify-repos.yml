name: '03-Classify Repos'

on:
  workflow_dispatch:
    inputs:
      batch_limit:
        description: 'Repos per batch'
        type: number
        default: 15
  workflow_run:
    workflows: ["02-Sync Starred Repos"]
    types:
      - completed

permissions:
  contents: write
  issues: write
  models: read
  actions: write

concurrency:
  # Hardcoded `ref: main` checkout + push, so use a constant group so
  # workflow_dispatch from any ref still serializes with workflow_run
  # runs and with self-dispatched continuation batches.
  group: classify-repos-main
  cancel-in-progress: false

env:
  BATCH_LIMIT: ${{ inputs.batch_limit || 15 }}

jobs:
  classify:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      || (github.event_name == 'workflow_run'
          && github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Bun
        # Bun version is auto-detected from package.json `packageManager`
        # field (currently "bun@1.3.13") per setup-bun README L11-15.
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        # `bun install --frozen-lockfile` per refs/oven-sh/bun/docs/cli/install.mdx
        # — fails the run if bun.lock is out of date instead of silently
        # mutating the lockfile.
        run: bun install --frozen-lockfile

      - run: |
          for i in 1 2 3; do
            git pull origin main && break || sleep 5
          done

      - name: Setup
        run: mkdir -p .github-stars/data

      - name: Prepare repos
        id: prep
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            if (!fs.existsSync('repos.yml')) {
              core.setOutput('has_repos', 'false');
              return;
            }
            
            const yaml = fs.readFileSync('repos.yml', 'utf8');
            // yq (mikefarah) pre-installed on ubuntu-latest since 2023
            const json = execSync('yq eval -o=json -', { input: yaml, encoding: 'utf8', maxBuffer: 50*1024*1024 });
            const data = JSON.parse(json);

            const unclassified = data.repositories.filter(r => 
              r.categories.includes('unclassified') && 
              (r.needs_review || !r.ai_classification?.classified_at)
            );

            const limit = parseInt(process.env.BATCH_LIMIT) || 15;
            const batch = unclassified.sort((a,b) => new Date(a.user_starred_at) - new Date(b.user_starred_at)).slice(0, Math.min(limit, 100));
            
            console.log(`Processing ${batch.length} of ${unclassified.length} unclassified repos`);
            
            if (batch.length === 0) {
              core.setOutput('has_repos', 'false');
              return;
            }

            // SECURITY: Sanitize inputs to prevent prompt injection
            const sanitizeText = (text) => {
              if (!text || typeof text !== 'string') return '';
              // Remove control characters, excessive whitespace, and potential injection patterns
              return text
                .replace(/[\x00-\x1F\x7F]/g, '') // Remove control chars
                .replace(/\s+/g, ' ') // Normalize whitespace
                .replace(/(['"`])\1+/g, '$1') // Remove only consecutive duplicate quotes
                .trim()
                .slice(0, 500); // Limit length
            };
            
            const repoNamePattern = /^[a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+$/;
            const repoData = batch.map(r => {
              const sanitizedRepo = String(r.repo).replace(/[^a-zA-Z0-9/_.-]/g, '');
              if (!repoNamePattern.test(sanitizedRepo)) {
                console.log(`Warning: Skipping invalid repo name format: ${sanitizedRepo}`);
                return null;
              }
              return {
                repo: sanitizedRepo,
                summary: sanitizeText(r.summary),
                language: r.github_metadata?.language ? sanitizeText(r.github_metadata.language) : null,
                topics: (r.github_metadata?.topics || [])
                  .filter(t => typeof t === 'string')
                  .map(t => sanitizeText(t))
                  .filter(t => t.length > 0)
                  .slice(0, 10),
                stargazers_count: Math.max(0, parseInt(r.github_metadata?.stargazers_count, 10) || 0)
              };
            }).filter(Boolean);

            // SECURITY: Load taxonomy dynamically to ensure consistency
            const allowedCategories = data.taxonomy?.categories_allowed || [];
            const allowedFrameworks = data.taxonomy?.frameworks_allowed || [];
            
            // Fail early if taxonomy is missing or empty
            if (allowedCategories.length === 0) {
              core.setFailed('Taxonomy categories_allowed is empty or missing - cannot classify');
              return;
            }
            
            // Generate language tags dynamically from batch, with fallback
            const languageAliasMap = {
              javascript: 'js', typescript: 'ts', 'c++': 'cpp', 'c#': 'csharp'
            };
            let languageTags = [...new Set(
              repoData.map(r => r.language).filter(Boolean)
                .map(l => l.toLowerCase())
                .map(l => languageAliasMap[l] || l)
            )];
            if (languageTags.length === 0) {
              languageTags = ['js', 'ts', 'python', 'rust', 'go', 'java', 'cpp', 'csharp'];
            }
            
            const systemPrompt = `Classify GitHub repos. Output ONLY a JSON array.

            CATEGORIES (ONLY use from this list): ${allowedCategories.join(', ')}

            FRAMEWORKS (ONLY use from this list OR null): ${allowedFrameworks.join(', ')}

            LANGUAGE TAGS: ${languageTags.map(l => `lang:${l}`).join(', ')}

            RULES:
            - 2-4 categories per repo
            - 3-6 descriptive tags (include lang:X if language provided)
            - framework must be from list above OR null
            - Output ONLY valid JSON array, no markdown
            - First char must be [, last must be ]

            EXAMPLE: [{"repo":"microsoft/vscode","categories":["dev-tools"],"tags":["code-editor","lang:ts"],"framework":null}]`;

            fs.writeFileSync('.github-stars/data/system-prompt.txt', systemPrompt);
            fs.writeFileSync('.github-stars/data/user-prompt.txt',
              'Classify these repositories:\n\n' + JSON.stringify(repoData, null, 2));

            // Write batch-meta for the typed validator (#71). The TS
            // gate consumes this + the AI response to produce a typed
            // ClassifierValidationResult before any manifest mutation.
            const batchMeta = {
              batchRepos: repoData.map(r => r.repo),
              taxonomy: {
                categories_allowed: allowedCategories,
                frameworks_allowed: allowedFrameworks,
              },
              evidence: repoData.map(r => ({ repo: r.repo, language: r.language })),
            };
            fs.writeFileSync('.github-stars/data/batch-meta.json', JSON.stringify(batchMeta));

            core.setOutput('has_repos', 'true');
            core.setOutput('repo_count', batch.length);

      - name: AI classify
        id: ai
        if: steps.prep.outputs.has_repos == 'true'
        uses: actions/ai-inference@v2
        with:
          model: openai/gpt-4o
          max-tokens: 3000
          system-prompt-file: .github-stars/data/system-prompt.txt
          prompt-file: .github-stars/data/user-prompt.txt

      # Typed validation gate per #71. The AI response file is parsed
      # and validated against the canonical taxonomy + per-repo
      # evidence BEFORE the apply step touches the manifest. Rows that
      # fail validation never reach reconciliation; rows whose
      # `lang:X` tags contradict gathered metadata are downgraded to
      # `needs_review` and surface for human eyes. See
      # `src/classifier/validator.ts` for the validation pipeline and
      # `src/classifier/validator.test.ts` for the 9 failure-mode
      # fixtures.
      - name: Validate AI output (typed gate)
        id: validate-ai
        if: steps.prep.outputs.has_repos == 'true'
        env:
          AI_RESPONSE_FILE: ${{ steps.ai.outputs.response-file }}
        run: |
          set -euo pipefail
          bun run classify:apply \
            "$AI_RESPONSE_FILE" \
            .github-stars/data/batch-meta.json \
            .github-stars/data/classifier-result.json

      # Apply step now consumes the TYPED validation result from the
      # validate-ai step (#71 / src/classifier/cli.ts). Raw model
      # output never reaches manifest mutation — every row that
      # mutates `data.repositories[idx]` is a `decision: "accept"` or
      # `decision: "needs_review"` row from
      # `ClassifierValidationResult`. Rejected rows are dropped with
      # their structured reason surfaced in the workflow summary.
      - name: Apply
        id: apply
        if: steps.prep.outputs.has_repos == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const validation = JSON.parse(fs.readFileSync('.github-stars/data/classifier-result.json', 'utf8'));
            const yaml = fs.readFileSync('repos.yml', 'utf8');
            const json = execSync('yq eval -o=json -', { input: yaml, encoding: 'utf8', maxBuffer: 50*1024*1024 });
            const data = JSON.parse(json);

            // Every row in `accepted` and `needs_review` already passed the
            // TS validator (taxonomy + framework + tag-pattern + lang
            // cross-check). Rejected rows are not visible here at all.
            const apply = (row, needsReview) => {
              const idx = data.repositories.findIndex(r => r.repo === row.repo);
              if (idx === -1) return false;
              data.repositories[idx].categories = row.categories.length > 0 ? row.categories : ["unclassified"];
              data.repositories[idx].tags = row.tags;
              data.repositories[idx].framework = row.framework;
              data.repositories[idx].needs_review = needsReview;
              data.repositories[idx].ai_classification = {
                model: "gpt-4o",
                classified_at: new Date().toISOString(),
                prompt_version: "v4-typed",
              };
              return true;
            };

            let count = 0;
            for (const row of validation.accepted) {
              if (apply(row, false)) count++;
            }
            for (const row of validation.needsReview) {
              if (apply(row, true)) count++;
            }

            // Surface rejected reasons in workflow log (sample first 5).
            for (const row of validation.rejected.slice(0, 5)) {
              console.log(`::warning::classifier rejected ${row.repo}: ${row.reason}`);
            }

            data.manifest_metadata.manifest_updated_at = new Date().toISOString();
            fs.writeFileSync('.github-stars/data/manifest.json', JSON.stringify(data, null, 2));
            core.setOutput('count', count);
            core.setOutput('accepted', validation.summary.acceptedCount);
            core.setOutput('needs_review', validation.summary.needsReviewCount);
            core.setOutput('rejected', validation.summary.rejectedCount);
            core.setOutput('missing', validation.summary.missingFromResponse.length);
            core.setOutput('extra', validation.summary.extraInResponse.length);

      - name: Convert to YAML
        if: steps.apply.outputs.count > 0
        run: yq eval '.' .github-stars/data/manifest.json -o=yaml > repos.yml

      - name: Cleanup
        if: always()
        run: rm -f .github-stars/data/*.json .github-stars/data/*.txt

      # Normalize FIRST so taxonomy aliases / casing drift from the AI batch
      # are canonicalized before any hard gate runs. Without this order, the
      # schema gate would reject AI output that the normalizer would
      # otherwise repair (e.g. `AI` → `ai`, plural/singular tag drift).
      - name: Normalize Manifest
        if: steps.apply.outputs.count > 0
        run: |
          echo "Running taxonomy normalization..."
          bun run normalize
          echo "Normalization complete"

      # HARD GATE: structural JSON Schema check on the normalized manifest.
      # cardinalby/schema-validator-action@v3 mode values:
      # `default | lax | strong | spec`. `default` enforces
      # `additionalProperties: false`, required fields, types, enums,
      # patterns. `strong` would also require maxLength next to every
      # pattern (which our schema does not satisfy). See
      # `.sisyphus/proofs/02M-mode-correction.md`.
      - name: Validate (schema)
        if: steps.apply.outputs.count > 0
        uses: cardinalby/schema-validator-action@v3
        with:
          schema: schemas/repos-schema.json
          file: repos.yml
          mode: default

      # HARD GATE: semantic taxonomy check. Each repo's categories/tags must
      # come from the closed set in `src/manifest/taxonomy.ts`. Schema gate
      # cannot catch this on its own.
      - name: Validate (taxonomy)
        if: steps.apply.outputs.count > 0
        run: |
          echo "Running strict taxonomy validation..."
          bun run validate
          echo "Validation passed"

      - name: Commit
        if: steps.apply.outputs.count > 0 && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos.yml
          git commit -m "AI classify ${{ steps.apply.outputs.count }} repos [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main
            git push && break || sleep 10
          done

      - name: Check remaining
        id: remaining
        if: steps.apply.outputs.count > 0
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const yaml = fs.readFileSync('repos.yml', 'utf8');
            const json = execSync('yq eval -o=json -', { input: yaml, encoding: 'utf8', maxBuffer: 50*1024*1024 });
            const data = JSON.parse(json);
            const remaining = data.repositories.filter(r => 
              r.categories.includes('unclassified') && (r.needs_review || !r.ai_classification?.classified_at)
            ).length;
            core.setOutput('count', remaining);
            core.setOutput('has_more', remaining > 0);

      - name: Trigger next
        # Self-dispatch when there are still unclassified repos. The
        # legacy `apply.outputs.retry` signal is gone — model output
        # parse failures now fail the validate-ai step (#71), which
        # fails the workflow. The operator re-dispatches.
        if: steps.remaining.outputs.has_more == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '03-classify-repos.yml',
              ref: 'main',
              inputs: { batch_limit: String(process.env.BATCH_LIMIT) }
            });

      - name: Classify summary
        if: always()
        env:
          HAS_REPOS: ${{ steps.prep.outputs.has_repos }}
          PREP_COUNT: ${{ steps.prep.outputs.repo_count }}
          APPLY_COUNT: ${{ steps.apply.outputs.count }}
          APPLY_ACCEPTED: ${{ steps.apply.outputs.accepted }}
          APPLY_NEEDS_REVIEW: ${{ steps.apply.outputs.needs_review }}
          APPLY_REJECTED: ${{ steps.apply.outputs.rejected }}
          APPLY_MISSING: ${{ steps.apply.outputs.missing }}
          APPLY_EXTRA: ${{ steps.apply.outputs.extra }}
          REMAINING: ${{ steps.remaining.outputs.count }}
          HAS_MORE: ${{ steps.remaining.outputs.has_more }}
        run: |
          {
            echo "# 03 — Classify Repos"
            echo ""
            echo "- Workflow: \`${{ github.workflow }}\`"
            echo "- Run ID: \`${{ github.run_id }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Batch limit: \`${BATCH_LIMIT}\`"
            echo ""
            echo "## Inputs"
            echo "- Has unclassified repos: \`${HAS_REPOS:-unknown}\`"
            echo "- Batch size submitted: \`${PREP_COUNT:-0}\`"
            echo ""
            echo "## Typed validation (#71 — bun run classify:apply)"
            echo "- Accepted: \`${APPLY_ACCEPTED:-0}\`"
            echo "- Needs review: \`${APPLY_NEEDS_REVIEW:-0}\` _(lang tag contradicted by metadata)_"
            echo "- Rejected: \`${APPLY_REJECTED:-0}\` _(unknown categories, extra rows, malformed)_"
            echo "- Missing from response: \`${APPLY_MISSING:-0}\` _(model dropped a row)_"
            echo "- Extra in response: \`${APPLY_EXTRA:-0}\` _(model returned a repo not in batch)_"
            echo ""
            echo "## Outputs"
            echo "- Classified this run: \`${APPLY_COUNT:-0}\` _(accepted + needs_review)_"
            echo "- Remaining unclassified: \`${REMAINING:-n/a}\`"
            echo "- Self-dispatched next batch: \`${HAS_MORE:-false}\`"
            echo ""
            echo "## Gates (in order)"
            echo "- \`bun run classify:apply\` (typed schema + taxonomy + framework + lang-tag evidence; \`src/classifier/validator.ts\`)"
            echo "- \`bun run normalize\` (in-place canonicalization of accepted rows)"
            echo "- \`cardinalby/schema-validator-action@v3\` (mode: default) against \`schemas/repos-schema.json\` — blocks commit"
            echo "- \`bun run validate\` (taxonomy strict via \`src/cli-validate.ts\`) — blocks commit"
            echo ""
            echo "## Next stage"
            if [ "${HAS_MORE:-false}" = "true" ]; then
              echo "- This workflow self-dispatches another batch."
            else
              echo "- \`04-Build and Deploy Site\` and \`05-Generate READMEs\` (workflow_run on success)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
