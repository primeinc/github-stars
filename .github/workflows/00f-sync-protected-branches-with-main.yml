name: sync-protected-branches-with-main

# Per the protection-stage brief: when `main` receives a real commit,
# both long-lived working lanes must be brought forward from `main`
# or marked stale. Otherwise we built a drawbridge and forgot the
# road.
#
# Lanes reconciled:
#   1. `next`              — integration lane (release flow lives here)
#   2. `ghapp/repo-admin`  — GitHub App / control-plane admin lane
#
# Policy (both lanes, identical — "successful pull to main FFs both
# branches"):
#   1. If exactly one open repo-owned `<lane> -> main` PR exists,
#      call PUT /pulls/{n}/update-branch with expected_head_sha.
#      The PR-driven path is preferred (carries reviewer + checks).
#   2. Else fall back to a fast-forward PATCH on the branch itself
#      (`PATCH /git/refs/heads/<lane>` with `force=false`). This
#      guarantees that a successful push to `main` advances both
#      lanes whether or not a release PR happens to be open.
#   3. Divergent history (ahead_by > 0) fails red — refuses
#      blind-force push.
#   4. Multiple open PRs fail red — refuses to choose.
#
# Doctrine:
#   - GitHub App installation token only. No PAT fallback.
#   - `expected_head_sha` for every update-branch call (stale-head
#     guard).
#   - FF-only on the branch-PATCH fallback (`force=false`).
#   - Fail loudly per lane if the lane cannot be advanced safely.
#   - Do not silently ignore either branch.
#   - Do not blindly push.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

# Mutating workflow: serialize to one in-flight run, but do NOT
# cancel a run mid-call. Calling `update-branch` and PATCHing
# `git/refs/heads/<branch>` is not transactional — canceling
# mid-flight could leave one lane updated and the other not.
# See `.github-stars/control-plane/workflow-triggers.md` §3.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ADMIN_LANE_BRANCH: ghapp/repo-admin
  RELEASE_LANE_BRANCH: next

jobs:
  sync-protected-branches-with-main:
    name: sync-protected-branches-with-main
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Reconcile next + ghapp/repo-admin against main
        id: reconcile
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          MAIN_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Open FD 3 to the workflow's real stderr so helper
          # functions can emit ::error:: annotations that survive
          # callers using `... 2>/dev/null` to suppress noise on the
          # happy path. See Copilot review comment on 00f:106.
          exec 3>&2

          owner="${REPO%%/*}"

          gh_api() {
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$@"
          }

          # URL-encode a value for use as a single REST path segment.
          # Per ../refs/github/docs/content/rest/using-the-rest-api/
          # troubleshooting-the-rest-api.md L74: "any path parameters
          # must be URL encoded. For example, any slashes in the
          # parameter value must be replaced with `%2F`." Required for
          # branch names containing `/` like `ghapp/repo-admin` — raw
          # interpolation produces `/branches/ghapp/repo-admin` which
          # the API parses as a multi-segment path and returns 404.
          # Per Copilot review on PR #81 (00f:185) and Codex review
          # (00f:212).
          urlencode() {
            jq -rn --arg v "$1" '$v | @uri'
          }

          # State accumulator for the summary step.
          : >state.txt
          record() {
            printf '%s\n' "$*" >>state.txt
          }

          record "main_sha=${MAIN_SHA}"

          # ------------------------------------------------------------
          # Helper: find exactly one open repo-owned PR with the given
          # head into main. Echoes a JSON object {number, head_sha,
          # html_url} on stdout, or empty if none/multiple.
          # ------------------------------------------------------------
          find_release_pr() {
            local head_branch="$1"
            local head_filter="${owner}:${head_branch}"
            local pr_json
            pr_json=$(gh_api "/repos/${REPO}/pulls?state=open&base=main&head=${head_filter}" \
              | jq --arg head "${head_branch}" --arg base "main" \
                  'map(select(.head.ref == $head and .base.ref == $base and .head.repo.full_name == .base.repo.full_name))')

            local count
            count=$(jq 'length' <<<"${pr_json}")
            if [ "${count}" -eq 1 ]; then
              jq '.[0] | {number, head_sha: .head.sha, html_url}' <<<"${pr_json}"
              return 0
            fi
            if [ "${count}" -eq 0 ]; then
              return 1
            fi
            # Multi-PR error path. Caller captures stdout via command
            # substitution + `2>/dev/null`. Write the diagnostic to
            # the workflow log directly via gh's GITHUB_STEP_SUMMARY
            # would be wrong here (helper, not a step); instead emit
            # to file descriptor 3 which we open to a known log path.
            # Simpler: write to >&2 NOW (before the redirect by the
            # caller would matter), and ALSO set a global state
            # variable the caller can read. Since the caller pattern
            # is `if find_release_pr ... 2>/dev/null; then ... else
            # rc=$?; fi`, the stderr WILL be swallowed. Use FD 3
            # (opened in the main script body) to bypass.
            #
            # Per Copilot review on PR #81: route both the
            # `::error::` annotation and the per-PR list to FD 3 so
            # they survive the caller's `2>/dev/null`. FD 3 is
            # opened to /dev/stderr at the top of this run script.
            echo "::error::Multiple open repo-owned ${head_branch} -> main PRs found; refusing to choose." >&3
            jq -r '.[] | "  - #\(.number) \(.html_url)"' <<<"${pr_json}" >&3
            return 2
          }

          # ------------------------------------------------------------
          # Helper: GitHub's PUT /pulls/{n}/update-branch with
          # expected_head_sha (stale-head guard). Updates the PR's
          # head branch to incorporate the latest base.
          # ------------------------------------------------------------
          update_pr_branch() {
            local pr_number="$1"
            local expected_head_sha="$2"
            gh_api \
              --method PUT \
              "/repos/${REPO}/pulls/${pr_number}/update-branch" \
              -f "expected_head_sha=${expected_head_sha}"
          }

          # ------------------------------------------------------------
          # Helper: compare a branch against main. Returns
          # `<branch_ahead_of_main> <branch_behind_main>` on stdout.
          #
          # Uses `compare/main...{branch}` (NOT `{branch}...main`)
          # because the GitHub compare API's `ahead_by`/`behind_by`
          # are computed relative to the basehead order:
          #   compare/A...B → ahead_by = commits in B not in A
          #                  behind_by = commits in A not in B
          # So compare/main...{branch} gives:
          #   ahead_by  = commits in branch not in main = branch AHEAD
          #   behind_by = commits in main not in branch = branch BEHIND
          # which matches the caller's variable semantic.
          # ------------------------------------------------------------
          ff_state() {
            local branch="$1"
            local branch_enc
            branch_enc=$(urlencode "${branch}")
            local cmp
            cmp=$(gh_api "/repos/${REPO}/compare/main...${branch_enc}")
            local behind_by ahead_by
            ahead_by=$(jq -r '.ahead_by' <<<"${cmp}")
            behind_by=$(jq -r '.behind_by' <<<"${cmp}")
            echo "${ahead_by} ${behind_by}"
          }

          # ------------------------------------------------------------
          # Helper: reconcile one lane against main. Policy (both
          # lanes, identical):
          #   1. If there is exactly one open repo-owned `<lane> ->
          #      main` PR, call PUT /pulls/{n}/update-branch with
          #      expected_head_sha (stale-head guard).
          #   2. If no open PR:
          #      - already up-to-date  -> record up_to_date
          #      - 0 ahead, N behind   -> FF-only PATCH
          #        /git/refs/heads/<lane> with force=false
          #      - divergent (ahead>0) -> red, refuse blind push
          #   3. If multiple open PRs -> red (already errored to FD3
          #      from find_release_pr).
          #
          # This is the canonical "successful pull to main FFs both
          # branches" policy. PR-driven update-branch is preferred
          # when a PR exists (carries reviewer + checks + history);
          # FF-only PATCH is the fallback so absence of a release PR
          # does not block sync.
          # ------------------------------------------------------------
          reconcile_lane() {
            local lane="$1"
            local prefix="$2"
            local lane_enc
            lane_enc=$(urlencode "${lane}")

            local before
            before=$(gh_api "/repos/${REPO}/branches/${lane_enc}" --jq '.commit.sha')
            record "${prefix}_sha_before=${before}"
            echo "${lane} before: ${before}"

            local pr_json
            if pr_json=$(find_release_pr "${lane}" 2>/dev/null); then
              local pr_number pr_head
              pr_number=$(jq -r '.number' <<<"${pr_json}")
              pr_head=$(jq -r '.head_sha' <<<"${pr_json}")
              echo "Found ${lane} -> main PR #${pr_number} (head ${pr_head})"
              record "${prefix}_pr=#${pr_number}"
              update_pr_branch "${pr_number}" "${pr_head}"
              sleep 2
              local after
              after=$(gh_api "/repos/${REPO}/branches/${lane_enc}" --jq '.commit.sha')
              record "${prefix}_sha_after=${after}"
              record "${prefix}_status=updated_via_pr"
              echo "${lane} after: ${after}"
              return 0
            fi

            local rc=$?
            if [ "${rc}" -eq 2 ]; then
              record "${prefix}_status=blocked_multiple_open_prs"
              echo "${prefix}_sync_failed=true" >>"$GITHUB_OUTPUT"
              return 0
            fi

            # rc=1: no open PR. Fall back to FF-only PATCH.
            echo "No open ${lane} -> main PR. Checking fast-forward state."
            local ahead_by behind_by
            read -r ahead_by behind_by < <(ff_state "${lane}")
            echo "ahead_by=${ahead_by} behind_by=${behind_by}"

            if [ "${ahead_by}" -eq 0 ] && [ "${behind_by}" -eq 0 ]; then
              echo "${lane} is already up-to-date with main."
              record "${prefix}_status=up_to_date"
              record "${prefix}_sha_after=${before}"
              return 0
            fi

            if [ "${ahead_by}" -eq 0 ] && [ "${behind_by}" -gt 0 ]; then
              echo "${lane} is ${behind_by} commit(s) behind main and 0 ahead — fast-forward via App."
              gh_api \
                --method PATCH \
                "/repos/${REPO}/git/refs/heads/${lane_enc}" \
                -f "sha=${MAIN_SHA}" \
                -F "force=false"
              local after
              after=$(gh_api "/repos/${REPO}/branches/${lane_enc}" --jq '.commit.sha')
              record "${prefix}_sha_after=${after}"
              record "${prefix}_status=fast_forwarded"
              echo "${lane} after: ${after}"
              return 0
            fi

            echo "::error::${lane} has ${ahead_by} commit(s) ahead and ${behind_by} commit(s) behind main — divergent history. Manual rebase/update required; refusing to blind-push."
            record "${prefix}_status=blocked_divergent_${ahead_by}_ahead_${behind_by}_behind"
            echo "${prefix}_sync_failed=true" >>"$GITHUB_OUTPUT"
          }

          # ============================================================
          # Lane 1: next (release lane)
          # ============================================================
          echo "::group::Reconcile next lane"
          reconcile_lane "${RELEASE_LANE_BRANCH}" "next"
          echo "::endgroup::"

          # ============================================================
          # Lane 2: ghapp/repo-admin (control-plane admin lane)
          # ============================================================
          echo "::group::Reconcile ghapp/repo-admin lane"
          reconcile_lane "${ADMIN_LANE_BRANCH}" "admin"
          echo "::endgroup::"

          # ============================================================
          # Final disposition: if either lane failed to sync, fail
          # the workflow so the operator sees the red signal.
          # Downstream PRs targeting either lane remain blocked
          # while that lane is stale.
          # ============================================================
          cat state.txt

          if grep -qE '^(next|admin)_sync_failed=true' "${GITHUB_OUTPUT:-/dev/null}" 2>/dev/null; then
            echo "::error::One or more protected branches could not be synced; downstream PRs remain blocked until both lanes are caught up to main."
            exit 1
          fi

      - name: Sync summary
        if: always()
        env:
          MAIN_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          {
            echo "# sync-protected-branches-with-main"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- main SHA: \`${MAIN_SHA}\`"
            echo "- Lanes reconciled: \`next\`, \`ghapp/repo-admin\`"
            echo ""
            if [ -f state.txt ]; then
              echo "## Reconciliation state"
              echo ""
              while IFS= read -r line; do
                echo "- \`${line}\`"
              done <state.txt
              echo ""
            fi
            echo "## Mechanism"
            echo "- GitHub App installation token (no PAT fallback)"
            echo "- Update-branch API: \`PUT /repos/{owner}/{repo}/pulls/{n}/update-branch\` with \`expected_head_sha\`"
            echo "- Fast-forward fallback for \`ghapp/repo-admin\` when no open PR: \`PATCH /repos/{owner}/{repo}/git/refs/heads/{branch}\` with \`force=false\` (FF-only)"
            echo "- Compare API: \`GET /repos/{owner}/{repo}/compare/main...{branch}\` for FF-state inspection (basehead order yields \`ahead_by\` = commits in branch not in main, \`behind_by\` = commits in main not in branch)"
            echo ""
            echo "## Downstream PR unblock condition"
            echo "Downstream PRs targeting either lane remain blocked until BOTH lanes are caught up to main. If either lane is stale or divergent, this workflow fails red and the operator must reconcile manually before the next push to main can clear the gate."
          } >>"$GITHUB_STEP_SUMMARY"
