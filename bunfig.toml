# Bun configuration. Refs:
#   ../refs/oven-sh/bun/docs/runtime/bunfig.mdx        — install + test sections
#   ../refs/oven-sh/bun/docs/test/lifecycle.mdx        — preload semantics
#   ../refs/oven-sh/bun/docs/test/configuration.mdx    — pathIgnorePatterns
#   ../refs/oven-sh/bun/docs/test/code-coverage.mdx    — coverageReporter form

[install]
# pnpm-style hard-link layout. Prevents phantom-dependency reads (a file
# accidentally importing a transitive that isn't declared in package.json
# would resolve in the flat node_modules; isolated catches it).
linker = "isolated"

# Bun 1.2+ default; declare explicitly so contributors with older bun
# can't regenerate the binary `bun.lockb` and slip it into the repo.
saveTextLockfile = true

[test]
# Preload runs ONCE per `bun test` process per docs L111-145. Order is
# load-bearing:
#   1. deterministic-env       env-var defaults; cheap.
#   2. strict-mode             beforeAll setSystemTime + unhandled-error
#                              handlers; cheap.
#   3. schema-registry         side-effect imports of every contracts
#                              module so GhStarsSchemaRegistry is
#                              populated before any test reads from it.
preload = [
  "./tests/setup/deterministic-env.ts",
  "./tests/setup/strict-mode.ts",
  "./tests/setup/schema-registry.ts",
]

# Excludes web/ (separate vite app, separate test runner) and the
# generated data tree from test discovery.
pathIgnorePatterns = ["web/**", ".github-stars/data/**", "node_modules/**"]

# Coverage opt-in via `bun run test:check --coverage` per
# refs/oven-sh/bun/docs/test/code-coverage.mdx:51-71.
coverageReporter = ["text", "lcov"]
coverageDir = "./coverage"
coverageSkipTestFiles = true

# Per-test timeout MUST be set on CLI as `--timeout=5000`. Bun 1.3.12
# ignored `[test] timeout` in bunfig (bug); 1.3.13 may have fixed it
# but we keep the CLI-floor convention so the source of truth is the
# test command, not split between two files.
